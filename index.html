function extractJSON(raw) {
  const s = (raw||"").replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  const a = s.indexOf("{"), b = s.lastIndexOf("}");
  if (a<0||b<0) throw new Error("Aucun JSON");

// ─── GRID LOGIC ──────────────────────────────────────────────────
// Place number in the current line only; a line must be completed before moving to the next one
function nextEditableRow(grid) {
  for (let r = 0; r < 3; r++) {
    if (grid[r].filter(v=>v!==null).length < 5) return r;
  }
  return -1;
}

function placeNumber(grid, n) {
  if (n < 1 || n > 90) return grid;
  if (grid.flat().includes(n)) return grid;
  const col = n === 90 ? 8 : Math.floor((n-1)/10);
  const r = nextEditableRow(grid);
  if (r < 0) return grid;
  if (grid[r][col] !== null) return grid;
  const ng = grid.map(row=>[...row]);
  ng[r][col] = n;
  return ng;
}

function canPlace(grid, n) {
  if (n < 1 || n > 90) return false;
  if (grid.flat().includes(n)) return false;
  const col = n === 90 ? 8 : Math.floor((n-1)/10);
  const r = nextEditableRow(grid);
  if (r < 0) return false;
  return grid[r][col] === null;
}

function removeNumber(grid, n) { return grid.map(row=>row.map(v=>v===n?null:v)); }

function lineStatus(row, ds) {
  const nums = row.filter(v=>v!==null);
  const hit  = nums.filter(n=>ds.has(n)).length;
  return { total:nums.length, hit, remaining:nums.length-hit };
}

function getRowMissingNumbers(grid, ds, rowIndex) {
  return grid[rowIndex].filter(n=>n!==null&&!ds.has(n));
}

function cardStatus(grid, ds, mode) {
  const ls = grid.map(r=>lineStatus(r,ds));
  const playable = ls.map((l,i)=>({...l,rowIndex:i})).filter(l=>l.total>0);
  const all = grid.flat().filter(v=>v!==null);
  const hitAll = all.filter(n=>ds.has(n)).length;
  const wonLines = playable.filter(l=>l.remaining===0).length;

  // ── Quine (1 ligne) : max 1 par carton ──
  // La meilleure ligne non gagnée (celle avec le moins de restants)
  const notWonLines = playable.filter(l=>l.remaining>0).sort((a,b)=>a.remaining-b.remaining);
  const bestLine = notWonLines[0]||null;
  const oneLineMissing = wonLines>=1 ? 0 : (bestLine ? bestLine.remaining : 0);
  const oneLineMissingNums = bestLine ? getRowMissingNumbers(grid,ds,bestLine.rowIndex) : [];
  const oneLineMissingNum = oneLineMissingNums[0]||null;

  // ── Double quine (2 lignes) ──
  // On cherche les 2 meilleures lignes non gagnées
  const linesNeeded = Math.max(0, 2-wonLines); // nb de lignes encore à gagner
  const twoLinesRemain = notWonLines.slice(0,linesNeeded).reduce((s,l)=>s+l.remaining,0);
  const twoLinesMissing = wonLines>=2 ? 0 : twoLinesRemain;
  // Les numéros manquants = ceux des lignes en attente
  const twoLinesMissingNums = notWonLines.slice(0,linesNeeded).flatMap(l=>getRowMissingNumbers(grid,ds,l.rowIndex));
  const twoLinesMissingNum = twoLinesMissingNums[0]||null;

  // ── Carton plein ──
  const fullMissing = all.length - hitAll;
  const fullMissingNums = all.filter(n=>!ds.has(n));
  const fullMissingNum = fullMissingNums[0]||null;

  const goals = {
    quine: {won:wonLines>=1, missing:oneLineMissing, missingNum:oneLineMissingNum, missingNums:oneLineMissingNums, alert:oneLineMissing<=2&&wonLines<1},
    double:{won:wonLines>=2, missing:twoLinesMissing, missingNum:twoLinesMissingNum, missingNums:twoLinesMissingNums, alert:twoLinesMissing<=2&&wonLines<2},
    full:  {won:hitAll===all.length&&all.length>0, missing:fullMissing, missingNum:fullMissingNum, missingNums:fullMissingNums, alert:fullMissing<=2}
  };

  const nextGoal = wonLines>=2?"Carton plein":wonLines>=1?"2 lignes":"1 ligne";
  if (mode==="quine")  return {won:goals.quine.won, alert:goals.quine.alert, lines:ls, hitAll, total:all.length, missing:goals.quine.missing, missingNum:oneLineMissingNum, wonLines, goals, nextGoal};
  if (mode==="double") return {won:goals.double.won, alert:goals.double.alert, lines:ls, hitAll, total:all.length, missing:goals.double.missing, missingNum:twoLinesMissingNum, wonLines, goals, nextGoal};
  return {won:goals.full.won, alert:goals.full.alert, lines:ls, hitAll, total:all.length, missing:goals.full.missing, missingNum:fullMissingNum, wonLines, goals, nextGoal};
}

function sortCards(cards, ds, mode) {
  return [...cards].sort((a,b)=>{
    const sa=cardStatus(a.grid,ds,mode), sb=cardStatus(b.grid,ds,mode);
    // 1. Gagnant en premier
    if (sa.won&&!sb.won) return -1;
    if (!sa.won&&sb.won) return 1;
    // 2. Alerte (proche de gagner) avant les autres
    if (sa.alert&&!sb.alert) return -1;
    if (!sa.alert&&sb.alert) return 1;
    // 3. Moins de numéros manquants = plus avancé
    if (sa.missing !== sb.missing) return sa.missing - sb.missing;
    // 4. À égalité de restants, plus de cochés = plus avancé
    return sb.hitAll - sa.hitAll;
  });
}

// ─── FIREWORKS ───────────────────────────────────────────────────
function Fireworks({active}) {
  const ref = useRef();
  useEffect(()=>{
    if (!active) return;
    const cv = ref.current; if (!cv) return;
    cv.width = window.innerWidth; cv.height = window.innerHeight;

      for (let j=0; j<80; j++) {
        const a=(Math.PI*2/80)*j, sp=2+Math.random()*8;
        pts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col:cols[~~(Math.random()*cols.length)],alpha:1,sz:2+Math.random()*4,delay:Math.random()*1000});
      }
    }
    const t0=Date.now(); let raf;
    const draw=()=>{
      const el=Date.now()-t0;
      ctx.clearRect(0,0,cv.width,cv.height);
      pts.forEach(p=>{
        if (el<p.delay) return;
        p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.vx*=.985; p.alpha-=.010;
        if (p.alpha<=0) return;
        ctx.globalAlpha=p.alpha; ctx.fillStyle=p.col;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      if (pts.some(p=>p.alpha>0)) raf=requestAnimationFrame(draw);
    };
    draw(); return ()=>cancelAnimationFrame(raf);
  },[active]);
  if (!active) return null;
  return React.createElement('canvas', { ref: ref, style: {position:"fixed",inset:0,zIndex:9999,pointerEvents:"none"},});
}

// ─── LOTO CARD ───────────────────────────────────────────────────
function LotoCard({card, ds, mode, onToggleActive, onEdit, markerId, markerColor, density, lm, onToggle}) {
  const st = useMemo(()=>cardStatus(card.grid,ds,mode),[card.grid,ds,mode]);

  const inactive = !card.active && card.category==="special";
  const wonLines = card.grid.map((row,ri)=>{
    const nums=row.filter(v=>v!==null);
    return nums.length>0&&nums.every(n=>ds.has(n))?ri:-1;
  }).filter(v=>v>=0);
  const outlineColor = st.won?"#f5c518":st.alert?"#ff4fa3":card.color;
  const headerBg = st.won?"linear-gradient(135deg,#f5c518,#ff6d00)":st.alert?"linear-gradient(135deg,#ff4fa3,#9c27b0)":card.color;
  const headerTxt = st.won?"#000":"#fff";
  const label = card.label||"Carton";

        position:"relative"},}
        , React.createElement('div', { style: {position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#ff4fa3,#00e5ff,#f5c518)"},})
        , React.createElement('div', { style: {background:headerBg,padding:"3px 6px",display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:3},}
          , React.createElement('span', { style: {fontFamily:"'Fredoka One',cursive",fontSize:9,color:headerTxt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"45%"},}, label)
          , !st.won&&(()=>{
              const g = !st.goals.quine.won ? st.goals.quine : !st.goals.double.won ? st.goals.double : st.goals.full;
              const gl = !st.goals.quine.won ? "1L" : !st.goals.double.won ? "2L" : "Plein";
              return React.createElement('span', { style: {fontFamily:"'Fredoka One',cursive",fontSize:8,
                  color:g.alert?"#fbbf24":"rgba(255,255,255,.85)",textAlign:"right",lineHeight:1.3,flexShrink:0}},

        )
        , React.createElement(CardGrid, { grid: card.grid, ds: ds, cardColor: card.color, markerId: markerId, markerColor: markerColor,

        , React.createElement('div', { style: {height:3,background:"rgba(0,0,0,.2)"},}
          , React.createElement('div', { style: {height:3,background:outlineColor,width:`${pct}%`,transition:"width .4s"},})

function firstInvalidEntryPosition(grid) {
  for (let r=0;r<3;r++) {
    let gapSeen = false;
    for (let c=0;c<9;c++) {
      const val = grid[r][c];
      if (val===null) gapSeen = true;
      else if (gapSeen) return {row:r,col:c};
    }
  }
  return null;
}

// Normalize image canvas (EXIF + portrait)
function normalizeImageCanvas(arrayBuf) {
  return new Promise(resolve => {
    let orientation = 1;
    try {
      const view = new DataView(arrayBuf);
      if (view.getUint16(0,false) === 0xFFD8) {
        let off = 2;
        while (off < view.byteLength) {
          if (view.getUint16(off,false) === 0xFFE1) {
            if (view.getUint32(off+4,false) === 0x45786966) {
              const little = view.getUint16(off+10,false) === 0x4949;
              const tags = view.getUint16(off+14,little);
              for (let i=0;i<tags;i++) {
                if (view.getUint16(off+16+i*12,little) === 0x0112) {
                  orientation = view.getUint16(off+16+i*12+8,little); break;
                }
              }
            }
            break;
          }
          off += 2+view.getUint16(off+2,false);
        }
      }
    } catch(_) {}

    const blob = new Blob([arrayBuf]);
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      const rot = (orientation >= 5 && orientation <= 8);
      let w = rot ? img.height : img.width;
      let h = rot ? img.width  : img.height;
      const MAX = 2000;
      const scale = Math.min(1, MAX / Math.max(w, h));
      const cw = Math.round(w*scale), ch = Math.round(h*scale);
      const cv = document.createElement('canvas');
      cv.width = cw; cv.height = ch;
      const ctx = cv.getContext('2d');
      ctx.save();
      if (orientation===6){ctx.translate(ch,0);ctx.rotate(Math.PI/2);}
      else if (orientation===8){ctx.translate(0,cw);ctx.rotate(-Math.PI/2);}
      else if (orientation===3){ctx.translate(cw,ch);ctx.rotate(Math.PI);}
      ctx.drawImage(img, 0, 0, cw, ch);
      ctx.restore();
      // Force portrait
      if (cv.width > cv.height) {
        const rv = document.createElement('canvas');
        rv.width = cv.height; rv.height = cv.width;
        const rc = rv.getContext('2d');
        rc.translate(0, cv.width);
        rc.rotate(-Math.PI/2);
        rc.drawImage(cv, 0, 0);
        URL.revokeObjectURL(url);
        return resolve(rv);
      }
      URL.revokeObjectURL(url);
      resolve(cv);
    };
    img.src = url;
  });
}

// Crop canvas into N card canvases (column-major order)
function cropCardCanvases(canvas, n) {
  if (n === 1) {
    const cv = document.createElement('canvas');
    cv.width = canvas.width; cv.height = canvas.height;
    cv.getContext('2d').drawImage(canvas, 0, 0);
    return [cv];
  }
  const cols = 2, rows = Math.ceil(n / cols);
  const W = canvas.width, H = canvas.height;
  const mx = Math.round(W * 0.008), my = Math.round(H * 0.008);
  const cardW = Math.round((W - mx*2) / cols);
  const cardH = Math.round((H - my*2) / rows);
  const crops = [];
  for (let col=0; col<cols; col++) {
    for (let row=0; row<rows; row++) {
      const cv = document.createElement('canvas');
      cv.width = cardW; cv.height = cardH;
      cv.getContext('2d').drawImage(canvas, mx+col*cardW, my+row*cardH, cardW, cardH, 0, 0, cardW, cardH);
      crops.push(cv);
    }
  }
  return crops.slice(0, n);
}

// Send one card canvas to Google Vision, get grid back
async function scanCardVision(cardCanvas) {
  const b64 = cardCanvas.toDataURL('image/jpeg', 0.92).split(',')[1];
  const res  = await fetch('/api/vision', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ image: b64 })
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  const { words } = await res.json();

  // Filter to numbers 1-90 only
  const nums = words
    .map(w => ({ n: parseInt(w.text.replace(/\D/g,''), 10), x: w.x, y: w.y, w: w.w, h: w.h }))
    .filter(w => !isNaN(w.n) && w.n >= 1 && w.n <= 90);

  if (!nums.length) return emptyGrid();

  // Determine card dimensions from bounding box of all numbers
  const minX = Math.min(...nums.map(w=>w.x));
  const maxX = Math.max(...nums.map(w=>w.x+w.w));
  const minY = Math.min(...nums.map(w=>w.y));
  const maxY = Math.max(...nums.map(w=>w.y+w.h));
  const totalW = maxX - minX;
  const totalH = maxY - minY;

  // Assign each number to a row (0,1,2) based on Y position
  // and to correct column based on its value
  const grid = [Array(9).fill(null), Array(9).fill(null), Array(9).fill(null)];
  const used = new Set();

  // Sort by Y to determine row boundaries
  const sortedY = [...nums].sort((a,b) => a.y - b.y);
  // Find 3 row clusters using Y position thirds
  const rowH = totalH / 3;

  for (const w of nums) {
    if (used.has(w.n)) continue;
    // Determine row by Y position relative to card
    const relY = w.y - minY;
    const row = Math.min(2, Math.floor(relY / rowH));
    // Correct column by number value
    const col = w.n <= 9 ? 0 : w.n >= 80 ? 8 : Math.floor(w.n / 10);
    // Place if slot is free
    if (grid[row][col] === null) {
      grid[row][col] = w.n;
      used.add(w.n);
    } else {
      // Try adjacent rows
      for (let r2=0; r2<3; r2++) {
        if (r2 !== row && grid[r2][col] === null) {
          grid[r2][col] = w.n;
          used.add(w.n);
          break;
        }
      }
    }
  }

  return validateGrid(grid);
}

    if (!images.length) return;

function validateGrid(grid) {
  if (!Array.isArray(grid) || grid.length !== 3) return grid;
  const corrected = [Array(9).fill(null), Array(9).fill(null), Array(9).fill(null)];
  const used = new Set();
  for (let r = 0; r < 3; r++) {
    if (!Array.isArray(grid[r])) continue;
    for (let c = 0; c < 9; c++) {
      const val = grid[r][c];
      if (val === null || val === undefined) continue;
      const n = Number(val);
      if (isNaN(n) || n < 1 || n > 90 || used.has(n)) continue;
      const correctCol = n <= 9 ? 0 : n >= 80 ? 8 : Math.floor(n / 10);
      if (corrected[r][correctCol] === null) {
        corrected[r][correctCol] = n; used.add(n);
      } else {
        for (let r2 = 0; r2 < 3; r2++) {
          if (r2 !== r && corrected[r2][correctCol] === null) {
            corrected[r2][correctCol] = n; used.add(n); break;
          }
        }
      }
    }
  }
  for (let r = 0; r < 3; r++) {
    const count = corrected[r].filter(v => v !== null).length;
    if (count > 5) {
      let removed = 0;
      for (let c = 8; c >= 0 && removed < count - 5; c--) {
        if (corrected[r][c] !== null) { used.delete(corrected[r][c]); corrected[r][c] = null; removed++; }
      }
    }
  }
  return corrected;
}
